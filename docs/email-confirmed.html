<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Email Confirmed | Carrier Route Pilot</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f8fb;
      --fg: #172033;
      --muted: #5f6b7a;
      --card: #ffffff;
      --border: #dfe4ea;
      --accent: #1a73e8;
      --accent-soft: #e8f1ff;
      --success: #22c55e;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1115;
        --fg: #f5f7fb;
        --muted: #b4bfcc;
        --card: #171a21;
        --border: #2a303b;
        --accent: #69a7ff;
        --accent-soft: #10233f;
      }
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }
    main {
      width: min(92vw, 520px);
      padding: 24px;
    }
    section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 36px 28px;
      text-align: center;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.1);
    }
    .mark {
      width: 76px;
      height: 76px;
      margin: 0 auto 22px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      background: var(--accent-soft);
      color: var(--success);
      font-size: 42px;
      font-weight: 900;
    }
    h1 {
      margin: 0;
      font-size: clamp(2rem, 8vw, 3rem);
      line-height: 1.05;
      letter-spacing: 0;
    }
    p {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 1.05rem;
    }
    a.button {
      display: inline-block;
      margin-top: 28px;
      padding: 15px 22px;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      font-weight: 800;
    }
    .small {
      margin-top: 18px;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <div class="mark">✓</div>
      <h1>Email confirmed</h1>
      <p>Your Carrier Route Pilot account is ready. You can return to the app and sign in.</p>
      <a class="button" href="routepilot://">Open Carrier Route Pilot</a>
      <p class="small">If the button does not open the app, reopen Carrier Route Pilot from your home screen.</p>
    </section>
  </main>
</body>
</html>
